<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GR Catgirl Editor</title>
    <link rel="stylesheet" href="/src/css/main.css" />
    <style>
      .bg-banner {
        background-image: url("/public/images/catgirlbanner.png");
        background-size: cover;
        background-position: center;
      }

      .nav-item.active {
        background-color: var(--accent-primary);
        color: white;
        box-shadow: 0 0 15px rgba(157, 0, 255, 0.5);
      }
    </style>
  </head>
  <body
    class="bg-[#0A0010] text-white overflow-hidden text-sm tracking-wider font-sans"
  >
    <div id="app" class="flex h-screen w-screen overflow-hidden">
      <!-- Thin Sidebar -->
      <aside
        id="sidebar"
        class="w-[80px] flex-shrink-0 bg-[#0d0016] border-r border-[#9d00ff]/30 flex flex-col items-center py-6 z-20 shadow-[4px_0_24px_rgba(157,0,255,0.1)]"
      >
        <!-- Logo -->
        <div class="w-14 h-14 mb-8 flex items-center justify-center">
          <img
            src="/public/icons/3355ceda-bf1f-4f10-8f29-a8ba381ee950.png"
            alt="Logo"
            class="max-w-full max-h-full object-contain drop-shadow-[0_0_8px_rgba(157,0,255,0.8)]"
            onerror="
              this.src =
                'data:image/svg+xml;utf8,<svg viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%239d00ff\' stroke-width=\'2\' xmlns=\'http://www.w3.org/2000/svg\'><path d=\'M12 2L2 22h20L12 2z\'/></svg>'
            "
          />
        </div>

        <nav class="flex-1 flex flex-col gap-4 w-full px-2" id="nav-menu">
          <!-- Navigation items will be injected by JS -->
        </nav>
      </aside>

      <!-- Side Character Panel -->
      <div
        class="w-[300px] h-full flex-shrink-0 border-r border-[#9d00ff]/20 bg-[#0a0010] relative hidden md:block"
      >
        <img
          src="/public/images/a7d9110d-d668-4bfa-8ac1-1ec7c421eeb7.png"
          class="w-full h-full object-cover opacity-90"
          alt="Character"
        />
        <div
          class="absolute inset-0 bg-gradient-to-b from-transparent via-[#0A0010]/20 to-[#0A0010] pointer-events-none"
        ></div>
      </div>

      <!-- Main Content Area -->
      <main
        class="flex-1 flex flex-col relative overflow-hidden z-10 bg-[#0A0010]"
        id="main-content"
      >
        <!-- Top Bar -->
        <header
          class="h-24 flex items-center px-8 border-b border-[#9d00ff]/20 justify-between shrink-0"
        >
          <!-- Search Bar -->
          <div class="relative w-full max-w-2xl mr-8">
            <input
              type="text"
              class="block w-full px-6 py-2.5 bg-transparent border border-[#9d00ff] rounded-full text-sm text-[#e0a6ff] placeholder-[#9d00ff]/60 focus:outline-none focus:ring-1 focus:ring-[#9d00ff] focus:border-[#9d00ff] transition-colors"
              placeholder="Search media library..."
            />
          </div>

          <img
            src="/public/images/catgirlprofilepic.png"
            alt="Profile"
            class="w-12 h-12 rounded-full border-2 border-[#9d00ff] object-cover shadow-[0_0_15px_rgba(157,0,255,0.4)]"
            onerror="
              this.src =
                'data:image/svg+xml;utf8,<svg viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%239d00ff\' stroke-width=\'2\' xmlns=\'http://www.w3.org/2000/svg\'><circle cx=\'12\' cy=\'8\' r=\'4\'/><path d=\'M20 21a8 8 0 0 0-16 0\'/></svg>'
            "
          />
        </header>

        <!-- Banner -->
        <div class="px-8 mt-6 shrink-0">
          <div
            class="w-full h-[120px] rounded-lg border border-[#9d00ff]/40 shadow-[0_0_20px_rgba(157,0,255,0.15)] bg-banner relative overflow-hidden"
          >
            <div
              class="absolute inset-0 bg-gradient-to-r from-[#0d0016]/80 via-transparent to-[#0d0016]/80 mix-blend-overlay"
            ></div>
          </div>
        </div>

        <!-- Tool Container -->
        <div id="tool-container" class="flex-1 overflow-y-auto p-8 relative">
          <!-- Dynamic Tool Content Will Be Rendered Here -->
        </div>
      </main>
    </div>

    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
